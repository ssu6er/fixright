<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixRight - Logowanie do panelu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-shell">
    <a href="/" class="back-link">Wróć do strony głównej</a>

    <section class="login-card">
      <span class="eyebrow">FixRight Admin</span>
      <h1>Zaloguj się do panelu zgłoszeń</h1>
      <p>Panel administracyjny służy do obsługi zgłoszeń serwisowych i jest dostępny wyłącznie dla uprawnionych osób.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="field">
          <label for="username">Login</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" />
          <span class="field-error" id="username-error"></span>
        </div>

        <div class="field">
          <label for="password">Hasło</label>
          <div class="password-row">
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Wpisz hasło" />
            <button type="button" class="text-toggle" id="toggle-pw">Pokaż</button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-alert" id="alert-error" hidden>
          <span id="alert-text">Nieprawidłowy login lub hasło.</span>
        </div>

        <button type="submit" class="login-btn" id="btn-submit">
          <span class="btn-label">Zaloguj</span>
          <span class="btn-spinner" hidden>Sprawdzanie...</span>
        </button>
      </form>
    </section>
  </div>

  <script src="login.js"></script>
</body>
</html>
